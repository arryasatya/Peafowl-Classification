<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PavoLens{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logos/logoapp-icon.png') }}">

  <!-- Bootswatch Flatly -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/flatly/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    .nav-link.active-page { color: #fff !important; font-weight: 600; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">

      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='img/logos/logo-navbar.png') }}"
             alt="PavoLens Logo"
             style="width: 28px; height: 28px; object-fit: contain; border-radius: 8px;">
        PavoLens
      </a>

      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active-page{% endif %}"
               href="{{ url_for('index') }}">
              <i class="bi bi-house me-1"></i>Beranda
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'about' %}active-page{% endif %}"
               href="{{ url_for('about') }}">
              <i class="bi bi-info-circle me-1"></i>Tentang
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'classify' %}active-page{% endif %}"
               href="{{ url_for('classify') }}">
              <i class="bi bi-search me-1"></i>Klasifikasi
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'history' %}active-page{% endif %}"
               href="{{ url_for('history') }}">
              <i class="bi bi-clock-history me-1"></i>Histori
            </a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- KONTEN -->
  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
